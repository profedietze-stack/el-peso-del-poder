<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Fondo cuadrado con esquinas redondeadas — área segura para maskable -->
  <rect width="512" height="512" rx="96" fill="#07111f"/>
  <!-- Columnas del edificio estatal -->
  <rect x="80" y="200" width="18" height="180" rx="4" fill="#1a3a6e"/>
  <rect x="130" y="200" width="18" height="180" rx="4" fill="#1a3a6e"/>
  <rect x="180" y="200" width="18" height="180" rx="4" fill="#1a3a6e"/>
  <rect x="314" y="200" width="18" height="180" rx="4" fill="#1a3a6e"/>
  <rect x="364" y="200" width="18" height="180" rx="4" fill="#1a3a6e"/>
  <rect x="414" y="200" width="18" height="180" rx="4" fill="#1a3a6e"/>
  <!-- Frontón triangular -->
  <polygon points="56,200 256,100 456,200" fill="#1e4080"/>
  <!-- Cornisa superior -->
  <rect x="56" y="193" width="400" height="14" rx="3" fill="#2a5298"/>
  <!-- Base / escalera -->
  <rect x="60" y="380" width="392" height="16" rx="4" fill="#2a5298"/>
  <rect x="40" y="396" width="432" height="14" rx="4" fill="#1e4080"/>
  <!-- Sillón presidencial (simplificado, estilizado) -->
  <rect x="208" y="270" width="96" height="90" rx="10" fill="#f1c40f"/>
  <rect x="196" y="330" width="120" height="16" rx="6" fill="#d4a017"/>
  <rect x="204" y="252" width="20" height="80" rx="8" fill="#f1c40f"/>
  <rect x="288" y="252" width="20" height="80" rx="8" fill="#f1c40f"/>
  <!-- Estrella presidencial en el sillón -->
  <text x="256" y="325" text-anchor="middle" font-size="32" fill="#07111f">★</text>
  <!-- Texto pequeño "SR" debajo -->
  <text x="256" y="470" text-anchor="middle" font-family="Georgia,serif" font-size="28" font-weight="bold" fill="#f1c40f" letter-spacing="6">SR</text>
</svg>
